name: Build Docker Image & Upload

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - '*'
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 赋予脚本执行权限
      - name: Add execute permission for shell scripts
        run: chmod +x *.sh

      # 校验必需文件
      - name: Verify required files
        run: |
          set -e
          REQUIRED=(Dockerfile setup_env.sh setup_repo.sh)
          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::Missing required file: $f"
              exit 1
            fi
          done

      # 解析镜像名 + 合法标签
      - name: Set image name and valid tag
        id: image_meta
        run: |
          set -e
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REF="${GITHUB_REF}"
          IS_TAG=false

          if [[ "${REF}" == refs/tags/* ]]; then
            IMG_TAG="${REF#refs/tags/}"
            IS_TAG=true
          else
            BRANCH="${REF#refs/heads/}"
            IMG_TAG="${BRANCH//\//_}"
          fi

          echo "IMAGE_NAME=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMG_TAG}" >> $GITHUB_OUTPUT
          echo "IS_TAG=${IS_TAG}" >> $GITHUB_OUTPUT

      # 构建镜像（3次重试）
      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 30
          command: |
            docker build --progress plain -t ${{ steps.image_meta.outputs.IMAGE_NAME }}:${{ steps.image_meta.outputs.IMAGE_TAG }} .

      # 导出原始 tar 包
      - name: Export image to tar
        id: export_tar
        run: |
          set -e
          IMG_NAME=${{ steps.image_meta.outputs.IMAGE_NAME }}
          IMG_TAG=${{ steps.image_meta.outputs.IMAGE_TAG }}
          TAR_FILE="${IMG_NAME}-${IMG_TAG}.tar"
          docker save -o "${TAR_FILE}" "${IMG_NAME}:${IMG_TAG}"
          echo "TAR_FILE=${TAR_FILE}" >> $GITHUB_OUTPUT

      # 判断大小：>2G 分卷，否则压缩
      - name: Check size & split/compress
        id: handle_file
        run: |
          set -e
          TAR_FILE=${{ steps.export_tar.outputs.TAR_FILE }}
          SIZE_THRESHOLD=$((2048 * 1024 * 1024))
          FILE_SIZE=$(du -b "${TAR_FILE}" | awk '{print $1}')
          ASSET_FILES=""

          if [ "${FILE_SIZE}" -gt "${SIZE_THRESHOLD}" ]; then
            echo "File > 2GB, split to 1800M chunks"
            split -b 1800M "${TAR_FILE}" "${TAR_FILE}.part"
            ASSET_FILES="${TAR_FILE}.part*"
          else
            echo "File <= 2GB, gzip compress"
            gzip "${TAR_FILE}"
            ASSET_FILES="${TAR_FILE}.gz"
          fi

          echo "ASSET_FILES=${ASSET_FILES}" >> $GITHUB_OUTPUT

      # 上传到 Actions Artifacts（所有场景都可用，兜底下载）
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-package
          path: ${{ steps.handle_file.outputs.ASSET_FILES }}
          retention-days: 30

      # 仅 Tag 触发时，才创建 Release 并上传
      - name: Create Release & Upload to Release
        if: steps.image_meta.outputs.IS_TAG == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.handle_file.outputs.ASSET_FILES }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
