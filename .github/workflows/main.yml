# 判断大小：>2G 分卷，否则压缩
      - name: Check size & split/compress
        id: handle_file
        run: |
          set -e
          TAR_FILE=${{ steps.export_tar.outputs.TAR_FILE }}
          SIZE_THRESHOLD=$((2048 * 1024 * 1024))
          FILE_SIZE=$(du -b "${TAR_FILE}" | awk '{print $1}')

          mkdir -p dist

          if [ "${FILE_SIZE}" -gt "${SIZE_THRESHOLD}" ]; then
            echo "File > 2GB, split to 1800M chunks"
            split -b 1800M "${TAR_FILE}" "dist/${TAR_FILE}.part"
          else
            echo "File <= 2GB, gzip compress"
            gzip "${TAR_FILE}"
            mv "${TAR_FILE}.gz" dist/
          fi

          echo "=== Generated Assets ==="
          ls -lh dist/

          # 【核心修复】强制展开通配符，将实际生成的所有文件路径，以多行文本形式写入环境变量和输出
          # 这样能强迫后续的 upload-artifact 步骤严格按照文件列表逐个上传，绝不会漏掉大文件
          echo "UPLOAD_PATHS<<EOF" >> $GITHUB_ENV
          ls -d dist/* >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 1. 上传到 Actions Artifacts（严格按照明确的文件列表上传）
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-package
          path: ${{ env.UPLOAD_PATHS }} # <-- 读取精准的文件列表，不让插件自己去扫描目录
          retention-days: 30

      # 2. 仅 Tag 触发时，才创建 Release 并上传
      - name: Create Release & Upload to Release
        if: steps.image_meta.outputs.IS_TAG == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.UPLOAD_PATHS }} # <-- 同样使用精准列表
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. 彻底清理
      - name: Clean up build artifacts
        if: always()
        run: |
          echo "=== Starting Cleanup ==="
          TAR_FILE="${{ steps.export_tar.outputs.TAR_FILE }}"
          if [ -f "${TAR_FILE}" ]; then rm -f "${TAR_FILE}"; fi
          if [ -d "dist" ]; then rm -rf dist; fi
          echo "=== Cleanup Completed ==="
