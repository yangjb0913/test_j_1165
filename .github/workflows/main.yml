name: Build Docker Image & Upload

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'main'
      - '*'
  workflow_dispatch:

jobs:
  build-and-package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 赋予脚本执行权限
      - name: Add execute permission for shell scripts
        run: chmod +x *.sh

      # 校验必需文件
      - name: Verify required files
        run: |
          set -e
          REQUIRED=(Dockerfile setup_env.sh setup_repo.sh)
          for f in "${REQUIRED[@]}"; do
            if [[ ! -f "$f" ]]; then
              echo "::error file=$f::Missing required file: $f"
              exit 1
            fi
          done

      # 解析镜像名 + 合法标签 + 生成构建时间戳
      - name: Set image name and valid tag
        id: image_meta
        run: |
          set -e
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REF="${GITHUB_REF}"
          IS_TAG=false

          if [[ "${REF}" == refs/tags/* ]]; then
            IMG_TAG="${REF#refs/tags/}"
            IS_TAG=true
          else
            BRANCH="${REF#refs/heads/}"
            IMG_TAG="${BRANCH//\//_}"
          fi

          echo "IMAGE_NAME=${REPO_NAME}" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=${IMG_TAG}" >> $GITHUB_OUTPUT
          echo "IS_TAG=${IS_TAG}" >> $GITHUB_OUTPUT
          
          # 【方案2新增】生成精准到秒的时间戳，解决非 Tag 构建时的 Release 重名冲突问题
          echo "BUILD_TIME=$(date +'%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      # 构建镜像（3次重试）
      - name: Build Docker image
        uses: nick-fields/retry@v3
        with:
          max_attempts: 3
          retry_wait_seconds: 30
          timeout_minutes: 30
          command: |
            docker build --progress plain -t ${{ steps.image_meta.outputs.IMAGE_NAME }}:${{ steps.image_meta.outputs.IMAGE_TAG }} .

      # 导出原始 tar 包
      - name: Export image to tar
        id: export_tar
        run: |
          set -e
          IMG_NAME=${{ steps.image_meta.outputs.IMAGE_NAME }}
          IMG_TAG=${{ steps.image_meta.outputs.IMAGE_TAG }}
          TAR_FILE="${IMG_NAME}-${IMG_TAG}.tar"
          docker save -o "${TAR_FILE}" "${IMG_NAME}:${IMG_TAG}"
          echo "TAR_FILE=${TAR_FILE}" >> $GITHUB_OUTPUT

      # 判断大小：>2G 分卷，否则压缩
      - name: Check size & split/compress
        id: handle_file
        run: |
          set -e
          TAR_FILE=${{ steps.export_tar.outputs.TAR_FILE }}
          SIZE_THRESHOLD=$((2048 * 1024 * 1024))
          FILE_SIZE=$(du -b "${TAR_FILE}" | awk '{print $1}')

          mkdir -p dist

          if [ "${FILE_SIZE}" -gt "${SIZE_THRESHOLD}" ]; then
            echo "File > 2GB, split to 1800M chunks"
            split -b 1800M "${TAR_FILE}" "dist/${TAR_FILE}.part"
          else
            echo "File <= 2GB, gzip compress"
            gzip "${TAR_FILE}"
            mv "${TAR_FILE}.gz" dist/
          fi

          echo "=== Generated Assets ==="
          ls -lh dist/

          # 核心修复：强制展开通配符，将实际生成的所有分卷路径以多行文本形式写入环境变量。
          echo "UPLOAD_PATHS<<EOF" >> $GITHUB_ENV
          ls -d dist/* >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      # 1. 上传到 Actions Artifacts
      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-package
          path: ${{ env.UPLOAD_PATHS }}
          retention-days: 30

      # 2. 无论什么情况触发，都自动创建独立的 Release 并上传分卷文件
      - name: Create Release & Upload to Release
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.UPLOAD_PATHS }}
          # 如果是 tag 触发用 tag 名；如果是普通分支/手动触发，用“分支名-时间戳”作为标签，防止报错冲突
          tag_name: ${{ steps.image_meta.outputs.IS_TAG == 'true' && steps.image_meta.outputs.IMAGE_TAG || format('{0}-{1}', steps.image_meta.outputs.IMAGE_TAG, steps.image_meta.outputs.BUILD_TIME) }}
          name: ${{ steps.image_meta.outputs.IS_TAG == 'true' && steps.image_meta.outputs.IMAGE_TAG || format('Build {0} ({1})', steps.image_meta.outputs.IMAGE_TAG, steps.image_meta.outputs.BUILD_TIME) }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. 任务彻底完成后，清理本地构建产生的大文件，释放磁盘空间
      - name: Clean up build artifacts
        if: always() # 确保无论成功失败都执行清理
        run: |
          echo "=== Starting Cleanup ==="
          TAR_FILE="${{ steps.export_tar.outputs.TAR_FILE }}"
          if [ -f "${TAR_FILE}" ]; then 
            rm -f "${TAR_FILE}"
          fi
          if [ -d "dist" ]; then 
            rm -rf dist
          fi
          echo "=== Cleanup Completed ==="
