name: Build Docker Image & Upload to Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    retry:
      max-attempts: 3
      delay-seconds: 30
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 校验必要文件：Dockerfile、setup_env.sh、setup_repo.sh
      - name: Check required files
        run: |
          REQUIRED_FILES=(
            "Dockerfile"
            "setup_env.sh"
            "setup_repo.sh"
          )
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "ERROR: 缺失必要文件 $file"
              exit 1
            fi
          done
          echo "所有必要文件校验通过"

      # 定义变量：仓库名作为镜像名
      - name: Set image info
        id: vars
        run: |
          REPO_NAME=${GITHUB_REPOSITORY#*/}
          IMAGE_TAG=${GITHUB_REF#refs/tags/}
          echo "IMAGE_NAME=$REPO_NAME" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      # 构建镜像
      - name: Build Docker image
        run: |
          docker build -t ${{ steps.vars.outputs.IMAGE_NAME }}:${{ steps.vars.outputs.IMAGE_TAG }} .

      # 导出并压缩镜像
      - name: Export image to tar.gz
        run: |
          IMG_NAME=${{ steps.vars.outputs.IMAGE_NAME }}
          IMG_TAG=${{ steps.vars.outputs.IMAGE_TAG }}
          TAR_FILE="${IMG_NAME}-${IMG_TAG}.tar"
          docker save -o "$TAR_FILE" "$IMG_NAME:$IMG_TAG"
          gzip "$TAR_FILE"
          echo "ASSET_FILE=${TAR_FILE}.gz" >> $GITHUB_ENV

      # 创建 Release 并上传文件
      - name: Create Release & Upload Asset
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ env.ASSET_FILE }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
